name: CI Pipeline

on:
        push:
                branches:
                        - main
                        - develop
        pull_request:
                branches:
                        - main
                        - develop
jobs:
        job1:
                runs-on: ubuntu-latest
                
                steps:
                        -name: Checkout
                         uses: actions/checkout@v3

                         -name: printing a message to confirm execution
                          run: echo 'current branch: ${{ github.ref }}'


